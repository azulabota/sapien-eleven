<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Top face gradient -->
    <linearGradient id="ogTopFace" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF3535"/>
      <stop offset="100%" stop-color="#C41A1A"/>
    </linearGradient>
    <!-- Left face gradient -->
    <linearGradient id="ogLeftFace" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#9B1515"/>
      <stop offset="100%" stop-color="#6B0A0A"/>
    </linearGradient>
    <!-- Right face gradient -->
    <linearGradient id="ogRightFace" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5C0808"/>
      <stop offset="100%" stop-color="#2A0303"/>
    </linearGradient>
    <!-- Top face shine -->
    <linearGradient id="ogShine" x1="280" y1="140" x2="400" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Red accent line gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#E82020" stop-opacity="0"/>
      <stop offset="20%" stop-color="#E82020" stop-opacity="1"/>
      <stop offset="80%" stop-color="#E82020" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E82020" stop-opacity="0"/>
    </linearGradient>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="35%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <!-- Glow filter for cube -->
    <filter id="cubeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#E82020" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="30" flood-color="#E82020" flood-opacity="0.2"/>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E82020" stroke-width="0.3" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <!-- Subtle grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Left side: 3D cube mark (scaled up, centered at ~340,315) -->
  <!-- Scale: favicon was 100px wide with cube spanning ~18-82 = 64px wide, 12-70 = 58px tall -->
  <!-- Scale factor ~3.8x: center 340,315, size ~120px half-width -->
  <g filter="url(#cubeGlow)">
    <!-- Right face (darkest): (82,30)(82,52)(50,70)(50,48) scaled -->
    <!-- Original right face at scale 4.0, centered 340,315: -->
    <!-- Original center was ~50,41. Offset: (340-200, 315-164) = (140,151) -->
    <!-- Scaled pts: (82*4+140-200+60, 30*4+151-164+20) -->
    <!-- Let me just define directly with a clean isometric cube -->
    <!-- Center: (340, 315), half-width: 130, quarter-height: 75 -->
    <!-- Top face: top=(340,145), right=(470,220), center=(340,295), left=(210,220) -->
    <!-- Left face: left=(210,220), center=(340,295), bottom=(340,465), leftBottom=(210,390) -->
    <!-- Right face: right=(470,220), rightBottom=(470,390), bottom=(340,465), center=(340,295) -->

    <!-- Right face (darkest shadow) -->
    <polygon
      points="470,220 470,390 340,465 340,295"
      fill="url(#ogRightFace)"
    />
    <!-- Left face (medium) -->
    <polygon
      points="210,220 340,295 340,465 210,390"
      fill="url(#ogLeftFace)"
    />
    <!-- Top face (brightest) -->
    <polygon
      points="340,145 470,220 340,295 210,220"
      fill="url(#ogTopFace)"
    />
    <!-- Shine on top face -->
    <polygon
      points="340,145 470,220 340,295 210,220"
      fill="url(#ogShine)"
    />
  </g>

  <!-- Edge highlights -->
  <line x1="340" y1="145" x2="210" y2="220" stroke="#FF6060" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="340" y1="145" x2="470" y2="220" stroke="#FF4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="340" y1="295" x2="340" y2="465" stroke="#7A0A0A" stroke-width="2" stroke-opacity="0.9"/>
  <line x1="210" y1="220" x2="210" y2="390" stroke="#6B0A0A" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="470" y1="220" x2="470" y2="390" stroke="#3A0505" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="210" y1="390" x2="340" y2="465" stroke="#5C0808" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="470" y1="390" x2="340" y2="465" stroke="#3A0505" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Right side: Text content -->
  <!-- "SAPIEN" -->
  <text
    x="590" y="268"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="900"
    letter-spacing="8"
    fill="#FFFFFF"
    text-anchor="start"
  >SAPIEN</text>

  <!-- "ELEVEN" in red -->
  <text
    x="590" y="370"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="900"
    letter-spacing="8"
    fill="#E82020"
    text-anchor="start"
  >ELEVEN</text>

  <!-- Divider line between SAPIEN and ELEVEN -->
  <rect x="590" y="382" width="530" height="3" fill="url(#accentLine)" opacity="0.6"/>

  <!-- Subtitle -->
  <text
    x="590" y="432"
    font-family="'Arial', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="6"
    fill="#888888"
    text-anchor="start"
  >AI + DATA LAYER</text>

  <!-- Bottom accent line -->
  <rect x="0" y="618" width="1200" height="3" fill="url(#accentLine)" opacity="0.8"/>

  <!-- Top-left corner node dots (decorative) -->
  <circle cx="80" cy="80" r="3" fill="#E82020" opacity="0.4"/>
  <circle cx="110" cy="60" r="2" fill="#E82020" opacity="0.3"/>
  <circle cx="60" cy="110" r="2" fill="#E82020" opacity="0.25"/>
  <line x1="80" y1="80" x2="110" y2="60" stroke="#E82020" stroke-width="1" opacity="0.2"/>
  <line x1="80" y1="80" x2="60" y2="110" stroke="#E82020" stroke-width="1" opacity="0.2"/>

  <!-- Bottom-right corner node dots (decorative) -->
  <circle cx="1120" cy="550" r="3" fill="#E82020" opacity="0.4"/>
  <circle cx="1150" cy="530" r="2" fill="#E82020" opacity="0.3"/>
  <circle cx="1100" cy="570" r="2" fill="#E82020" opacity="0.25"/>
  <line x1="1120" y1="550" x2="1150" y2="530" stroke="#E82020" stroke-width="1" opacity="0.2"/>
  <line x1="1120" y1="550" x2="1100" y2="570" stroke="#E82020" stroke-width="1" opacity="0.2"/>
</svg>
